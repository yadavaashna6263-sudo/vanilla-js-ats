<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotlight — Review Your Application</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/forms.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body data-page="apply" data-progress="100" data-progress-label="Step 5 of 5 · 100%" data-step-index="4">
  <a href="#main" class="skip-link">Skip to main content</a>

  <header class="site-header">
    <div class="container">
      <a href="index.html" class="brand"><span class="brand-mark" aria-hidden="true"></span>Spotlight</a>
      <nav class="main-nav" aria-label="Primary">
        <a href="index.html" data-nav-key="home">Home</a>
        <a href="jobs.html" data-nav-key="jobs">Jobs</a>
        <a href="dashboard.html" data-nav-key="dashboard">Dashboard</a>
      </nav>
      <div class="header-actions">
        <button class="theme-toggle" aria-label="Switch between dark and light theme" aria-pressed="false">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main id="main">
    <section class="section--tight">
      <div class="container" style="max-width:760px;margin:0 auto;">
        <div class="form-steps" aria-hidden="true">
          <div class="form-step"></div><div class="form-step"></div><div class="form-step"></div>
          <div class="form-step"></div><div class="form-step"></div>
        </div>
        <div class="form-steps-labels" aria-hidden="true">
          <span>Personal</span><span>Professional</span><span>Experience</span><span>Account</span><span>Review</span>
        </div>

        <span class="eyebrow">Step 5 of 5</span>
        <h2 style="font-size:1.6rem;margin-bottom:6px;">Review Your Application</h2>
        <p style="margin-bottom:28px;">Take one last look before it goes to the recruiting team.</p>

        <div id="profileCompletion" class="completion-widget"></div>

        <!-- Skeleton shown briefly while "restoring" the saved profile -->
        <div id="reviewSkeleton">
          <div class="card" style="margin-bottom:20px;">
            <div class="skeleton" style="height:18px;width:40%;margin-bottom:16px;"></div>
            <div class="skeleton" style="height:14px;width:90%;margin-bottom:10px;"></div>
            <div class="skeleton" style="height:14px;width:70%;"></div>
          </div>
          <div class="card" style="margin-bottom:20px;">
            <div class="skeleton" style="height:18px;width:50%;margin-bottom:16px;"></div>
            <div class="skeleton" style="height:14px;width:85%;margin-bottom:10px;"></div>
            <div class="skeleton" style="height:14px;width:60%;"></div>
          </div>
        </div>

        <div id="reviewRoot" class="visually-hidden"></div>

        <div class="declaration">
          <input type="checkbox" id="declarationCheckbox" />
          <label for="declarationCheckbox">I confirm all information provided in this application is correct.</label>
        </div>

        <button type="button" id="reviewSubmitBtn" class="btn btn--primary btn--block" disabled>
          Submit Application
        </button>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="footer-note">© <span data-year></span> Spotlight ATS — a frontend systems demo.</p>
      <p class="footer-note mono">Edits here are saved back to your draft</p>
    </div>
  </footer>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/completion.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/readiness.js"></script>
  <script src="js/review.js"></script>
</body>
</html>
